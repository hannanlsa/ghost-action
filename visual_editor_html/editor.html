<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>GhostAction</title>
<link rel="stylesheet" href="drawflow.min.css?v=4">
<script src="drawflow.min.js?v=4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#1a1a2e;color:#e0e0e0;overflow:hidden;height:100vh;display:flex;flex-direction:column}

#toolbar{display:flex;align-items:center;gap:6px;padding:6px 12px;background:#16213e;border-bottom:1px solid #0f3460;min-height:40px;flex-shrink:0;z-index:100}
#toolbar button{padding:4px 10px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap}
#toolbar button:hover{filter:brightness(1.15)}
#btn-save{background:#4caf50;color:#fff}
#btn-load{background:#2196f3;color:#fff}
#btn-run{background:#ff9800;color:#fff}
#btn-clear{background:#666;color:#fff}
#btn-add-cond{background:#9c27b0;color:#fff}
#btn-add-loop{background:#ff5722;color:#fff}
#btn-add-wait{background:#607d8b;color:#fff}

#editor-area{flex:1;overflow:hidden;position:relative;z-index:1;background:#1a1a2e}
#drawflow{width:100%;height:100%;background:#1a1a2e}

#zoom-bar{position:fixed;bottom:30px;right:16px;display:flex;align-items:center;gap:4px;background:#16213e;border:1px solid #0f3460;border-radius:6px;padding:4px 8px;z-index:200}
#zoom-bar button{width:28px;height:28px;border:none;border-radius:4px;background:#0f3460;color:#e0e0e0;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
#zoom-bar button:hover{background:#1a5a8e}
#zoom-label{font-size:11px;color:#aaa;min-width:40px;text-align:center}

#minimap{position:fixed;bottom:30px;left:16px;width:160px;height:100px;background:#0f0f23;border:1px solid #0f3460;border-radius:6px;z-index:200;overflow:hidden}
#minimap canvas{width:100%;height:100%}
#minimap-viewport{position:absolute;border:1.5px solid #e94560;border-radius:1px;pointer-events:none}

#statusbar{height:22px;padding:4px 16px;background:#16213e;border-top:1px solid #0f3460;font-size:11px;color:#888;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;z-index:100}

.drawflow .drawflow-node{background:#16213e;border:1px solid #0f3460;border-radius:6px;min-width:180px;max-width:260px;color:#e0e0e0;font-size:12px}
.drawflow .drawflow-node.selected{border-color:#e94560;box-shadow:0 0 8px rgba(233,69,96,.4)}
.drawflow .drawflow-node .drawflow_content_node{padding:8px}

.node-card{display:flex;flex-direction:column;gap:4px}
.node-thumb{width:100%;height:60px;object-fit:cover;border-radius:3px;background:#2a2a4a;display:block}
.node-thumb-placeholder{width:100%;height:40px;border-radius:3px;background:#2a2a4a;display:flex;align-items:center;justify-content:center;color:#555;font-size:11px}
.node-title{font-weight:600;font-size:12px;color:#e94560;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-desc{font-size:11px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-param{font-size:10px;color:#888;margin-top:2px}
.node-param input{width:50px;background:#0f3460;border:1px solid #1a3a6e;color:#e0e0e0;border-radius:2px;padding:1px 4px;font-size:10px}
.node-comment{font-size:10px;color:#ffab40;font-style:italic;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-disabled{opacity:.45}
.node-type-mouse .drawflow_content_node{border-left:3px solid #4caf50}
.node-type-key .drawflow_content_node{border-left:3px solid #2196f3}
.node-type-wait .drawflow_content_node{border-left:3px solid #ff9800}
.node-type-cond .drawflow_content_node{border-left:3px solid #9c27b0}
.node-type-loop .drawflow_content_node{border-left:3px solid #ff5722}
.node-type-other .drawflow_content_node{border-left:3px solid #607d8b}

.drawflow .connection .main-path{stroke:#0f3460;stroke-width:2}
.drawflow .connection .main-path:hover{stroke:#e94560}

.context-menu{position:fixed;background:#16213e;border:1px solid #0f3460;border-radius:4px;padding:4px 0;z-index:9999;min-width:120px;display:none}
.context-menu div{padding:6px 16px;cursor:pointer;font-size:12px;color:#e0e0e0}
.context-menu div:hover{background:#0f3460}
</style>
</head>
<body>
<div id="toolbar">
  <button id="btn-save" onclick="saveScript()">保存</button>
  <button id="btn-load" onclick="loadScript()">加载</button>
  <button id="btn-run" onclick="runScript()">运行</button>
  <button id="btn-add-cond" onclick="addCondition()">+条件</button>
  <button id="btn-add-loop" onclick="addLoop()">+循环</button>
  <button id="btn-add-wait" onclick="addWait()">+等待</button>
  <button id="btn-clear" onclick="clearAll()">清空</button>
</div>
<div id="editor-area"><div id="drawflow"></div></div>
<div id="zoom-bar">
  <button onclick="doZoomOut()" title="缩小">-</button>
  <span id="zoom-label">100%</span>
  <button onclick="doZoomIn()" title="放大">+</button>
  <button onclick="zoomFit()" title="适应全部" style="font-size:12px;width:auto;padding:0 8px">全</button>
</div>
<div id="minimap"><canvas id="minimap-canvas"></canvas><div id="minimap-viewport"></div></div>
<div id="statusbar">
  <span id="status-left">就绪 | 滚轮缩放 | 拖拽平移</span>
  <span id="status-right">v2.2.15</span>
</div>
<div class="context-menu" id="ctx-menu">
  <div onclick="ctxDisable()">禁用此步</div>
  <div onclick="ctxEnable()">启用此步</div>
  <div onclick="ctxDelete()">删除此步</div>
  <div onclick="ctxComment()">添加注释</div>
</div>

<script>
var BRIDGE='http://localhost:18432/bridge';
var THUMB_URL='thumbs/';
function winClose(){try{pywebview.api.close()}catch(e){window.close()}}
function winMin(){try{pywebview.api.minimize()}catch(e){}}
function winMax(){try{pywebview.api.toggle_fullscreen()}catch(e){}}

var editor=new Drawflow(document.getElementById('drawflow'));
editor.reroute=true;
editor.reroute_fix_curvature=true;
editor.force_first_input=false;
editor.start();

var ctxNodeId=null;
var allEvents=[];

var ea=document.getElementById('editor-area');
ea.addEventListener('wheel',function(e){
  e.preventDefault();
  var rect=ea.getBoundingClientRect();
  var mx=e.clientX-rect.left;
  var my=e.clientY-rect.top;
  var oldZoom=editor.zoom;
  var delta=e.deltaY>0?-0.1:0.1;
  var newZoom=Math.min(1.6,Math.max(0.3,oldZoom+delta));
  if(newZoom===oldZoom)return;
  var cx=editor.canvas_x;
  var cy=editor.canvas_y;
  var factor=newZoom/oldZoom;
  editor.canvas_x=mx-(mx-cx)*factor;
  editor.canvas_y=my-(my-cy)*factor;
  editor.zoom=newZoom;
  editor.zoom_last_value=newZoom;
  var pre=editor.precanvas||document.querySelector('#drawflow .drawflow');
  if(pre)pre.style.transform='translate('+editor.canvas_x+'px, '+editor.canvas_y+'px) scale('+editor.zoom+')';
  updateZoomLabel();
  updateMinimap();
},{passive:false});

function bridge(action,data){
  try{var x=new XMLHttpRequest();x.open('POST',BRIDGE,true);x.setRequestHeader('Content-Type','application/json');x.send(JSON.stringify({action:action,data:data}));}catch(e){}
}

window.onerror=function(msg,url,line){
  var s=document.getElementById('status-left');if(s)s.textContent='JS ERROR: '+msg;
  bridge('js_error',{msg:msg,url:url,line:line});
};

function getStepLabel(ev){
  if(ev.type==='mouse_down'||ev.type==='mouse_up')return'点击 ('+Math.round(ev.x)+','+Math.round(ev.y)+')';
  if(ev.type==='mouse_drag')return'拖拽 ('+Math.round(ev.x1)+','+Math.round(ev.y1)+')->('+Math.round(ev.x2)+','+Math.round(ev.y2)+')';
  if(ev.type==='scroll')return'滚动 '+(ev.dy>0?'下':'上');
  if(ev.type==='type_text')return'输入: '+(ev.text||'').substring(0,15);
  if(ev.type==='key_down'||ev.type==='key_up')return'按键: '+(ev.key_name||ev.text||'');
  if(ev.type==='screenshot')return'截图';
  if(ev.type==='wait_for')return'等待 '+(ev.timeout||1)+'s';
  if(ev.type==='comment')return'备注: '+(ev.text||'');
  return ev.type;
}

function getNodeType(ev){
  if(ev.type==='mouse_down'||ev.type==='mouse_up'||ev.type==='mouse_drag'||ev.type==='scroll')return'mouse';
  if(ev.type==='key_down'||ev.type==='key_up'||ev.type==='type_text')return'key';
  if(ev.type==='wait_for')return'wait';
  if(ev.type==='if'||ev.type==='endif')return'cond';
  if(ev.type==='for'||ev.type==='endfor')return'loop';
  return'other';
}

function getThumbHtml(ev){
  var tpl=ev.template||ev.screenshot_file||'';
  if(tpl){
    var src=THUMB_URL+tpl;
    return'<img class="node-thumb" src="'+src+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="node-thumb-placeholder" style="display:none">'+getStepLabel(ev)+'</div>';
  }
  return'<div class="node-thumb-placeholder">'+getStepLabel(ev)+'</div>';
}

function buildNodeHtml(ev,idx){
  var label=getStepLabel(ev);
  var nt=getNodeType(ev);
  var thumb=getThumbHtml(ev);
  var waitVal=0.3;
  if(ev.type==='mouse_down'||ev.type==='mouse_up')waitVal=0.3;
  else if(ev.type==='key_down'||ev.type==='key_up')waitVal=0.1;
  else if(ev.type==='type_text')waitVal=0.1;
  var comment=ev._comment||'';
  var disabled=ev._disabled?' node-disabled':'';
  var outputs=1;
  var inputs=1;
  if(nt==='cond')outputs=2;
  return{html:'<div class="node-card'+disabled+'" data-idx="'+idx+'">'+thumb+'<div class="node-title">'+label+'</div>'+'<div class="node-desc">'+(ev.button?ev.button+' ':'')+(ev.window_name||'')+'</div>'+'<div class="node-param">等待 <input type="number" step="0.1" min="0" value="'+waitVal+'" onchange="updateWait('+idx+',this.value)">s</div>'+(comment?'<div class="node-comment">// '+comment+'</div>':'')+'</div>',inputs:inputs,outputs:outputs,nt:nt};
}

function eventsToNodes(events){
  editor.clear();
  allEvents=events||[];
  var prevId=null;
  var x=80,y=80;
  for(var i=0;i<events.length;i++){
    var ev=events[i];
    var nt=getNodeType(ev);
    var nb=buildNodeHtml(ev,i);
    var nodeId=editor.addNode('step_'+i,nb.inputs,nb.outputs,x,y,'node-type-'+nt,{},nb.html);
    if(prevId!==null){
      editor.addConnection(prevId,nodeId,'output_1','input_1');
    }
    prevId=nodeId;
    x+=260;
  }
  document.getElementById('status-left').textContent='已加载 '+events.length+' 步 | 滚轮缩放 | 拖拽平移';
  setTimeout(function(){updateMinimap();},300);
}

function doZoomIn(){
  var rect=ea.getBoundingClientRect();
  var mx=rect.width/2;
  var my=rect.height/2;
  var oldZoom=editor.zoom;
  var newZoom=Math.min(1.6,oldZoom+0.1);
  if(newZoom===oldZoom)return;
  var factor=newZoom/oldZoom;
  editor.canvas_x=mx-(mx-editor.canvas_x)*factor;
  editor.canvas_y=my-(my-editor.canvas_y)*factor;
  editor.zoom=newZoom;
  editor.zoom_last_value=newZoom;
  var pre=editor.precanvas||document.querySelector('#drawflow .drawflow');
  if(pre)pre.style.transform='translate('+editor.canvas_x+'px, '+editor.canvas_y+'px) scale('+editor.zoom+')';
  updateZoomLabel();
  updateMinimap();
}

function doZoomOut(){
  var rect=ea.getBoundingClientRect();
  var mx=rect.width/2;
  var my=rect.height/2;
  var oldZoom=editor.zoom;
  var newZoom=Math.max(0.3,oldZoom-0.1);
  if(newZoom===oldZoom)return;
  var factor=newZoom/oldZoom;
  editor.canvas_x=mx-(mx-editor.canvas_x)*factor;
  editor.canvas_y=my-(my-editor.canvas_y)*factor;
  editor.zoom=newZoom;
  editor.zoom_last_value=newZoom;
  var pre=editor.precanvas||document.querySelector('#drawflow .drawflow');
  if(pre)pre.style.transform='translate('+editor.canvas_x+'px, '+editor.canvas_y+'px) scale('+editor.zoom+')';
  updateZoomLabel();
  updateMinimap();
}

function zoomFit(){
  var nodes=document.querySelectorAll('.drawflow-node');
  if(nodes.length===0)return;
  var minX=Infinity,minY=Infinity,maxX=0,maxY=0;
  nodes.forEach(function(n){
    if(n.offsetLeft<minX)minX=n.offsetLeft;
    if(n.offsetTop<minY)minY=n.offsetTop;
    var r=n.offsetLeft+n.offsetWidth;
    var b=n.offsetTop+n.offsetHeight;
    if(r>maxX)maxX=r;
    if(b>maxY)maxY=b;
  });
  var cw=maxX-minX+120;
  var ch=maxY-minY+120;
  var vw=ea.clientWidth;
  var vh=ea.clientHeight;
  var scale=Math.min(vw/cw,vh/ch,1.5);
  editor.zoom=scale;
  editor.zoom_last_value=scale;
  editor.canvas_x=(vw-cw*scale)/2-minX*scale+60*scale;
  editor.canvas_y=(vh-ch*scale)/2-minY*scale+60*scale;
  var pre=editor.precanvas||document.querySelector('#drawflow .drawflow');
  if(pre)pre.style.transform='translate('+editor.canvas_x+'px, '+editor.canvas_y+'px) scale('+editor.zoom+')';
  updateZoomLabel();
  updateMinimap();
}

function updateZoomLabel(){
  document.getElementById('zoom-label').textContent=Math.round(editor.zoom*100)+'%';
}

function updateMinimap(){
  var canvas=document.getElementById('minimap-canvas');
  var vp=document.getElementById('minimap-viewport');
  var nodes=document.querySelectorAll('.drawflow-node');
  if(nodes.length===0){canvas.width=160;canvas.height=100;return;}
  var minX=Infinity,minY=Infinity,maxX=0,maxY=0;
  nodes.forEach(function(n){
    if(n.offsetLeft<minX)minX=n.offsetLeft;
    if(n.offsetTop<minY)minY=n.offsetTop;
    var r=n.offsetLeft+n.offsetWidth;
    var b=n.offsetTop+n.offsetHeight;
    if(r>maxX)maxX=r;
    if(b>maxY)maxY=b;
  });
  var pad=60;
  minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  var cw=maxX-minX;
  var ch=maxY-minY;
  var mmW=160,mmH=100;
  var s=Math.min(mmW/cw,mmH/ch);
  canvas.width=mmW;canvas.height=mmH;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,mmW,mmH);
  ctx.fillStyle='#0f3460';
  nodes.forEach(function(n){
    var x=(n.offsetLeft-minX)*s;
    var y=(n.offsetTop-minY)*s;
    var w=n.offsetWidth*s;
    var h=n.offsetHeight*s;
    ctx.fillRect(x,y,Math.max(w,4),Math.max(h,3));
  });
  var pre=editor.precanvas||document.querySelector('#drawflow .drawflow');
  if(pre){
    var vx=(-editor.canvas_x/editor.zoom-minX)*s;
    var vy=(-editor.canvas_y/editor.zoom-minY)*s;
    var vw2=(ea.clientWidth/editor.zoom)*s;
    var vh2=(ea.clientHeight/editor.zoom)*s;
    vp.style.left=Math.max(0,vx)+'px';
    vp.style.top=Math.max(0,vy)+'px';
    vp.style.width=Math.min(vw2,mmW)+'px';
    vp.style.height=Math.min(vh2,mmH)+'px';
  }
}

editor.on('nodeMoved',function(){updateMinimap();});
editor.on('nodeCreated',function(){setTimeout(updateMinimap,100);});
editor.on('nodeRemoved',function(){setTimeout(updateMinimap,100);});

var _mmDrag=false;
document.getElementById('minimap').addEventListener('mousedown',function(e){
  _mmDrag=true;minimapJump(e);
});
document.addEventListener('mousemove',function(e){
  if(_mmDrag)minimapJump(e);
});
document.addEventListener('mouseup',function(){_mmDrag=false;});

function minimapJump(e){
  var mm=document.getElementById('minimap');
  var rect=mm.getBoundingClientRect();
  var mx=e.clientX-rect.left;
  var my=e.clientY-rect.top;
  var nodes=document.querySelectorAll('.drawflow-node');
  if(nodes.length===0)return;
  var minX=Infinity,minY=Infinity,maxX=0,maxY=0;
  nodes.forEach(function(n){
    if(n.offsetLeft<minX)minX=n.offsetLeft;
    if(n.offsetTop<minY)minY=n.offsetTop;
    var r=n.offsetLeft+n.offsetWidth;
    var b=n.offsetTop+n.offsetHeight;
    if(r>maxX)maxX=r;
    if(b>maxY)maxY=b;
  });
  var pad=60;
  minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  var cw=maxX-minX;
  var ch=maxY-minY;
  var mmW=160,mmH=100;
  var s=Math.min(mmW/cw,mmH/ch);
  var worldX=mx/s+minX;
  var worldY=my/s+minY;
  editor.canvas_x=-worldX*editor.zoom+ea.clientWidth/2;
  editor.canvas_y=-worldY*editor.zoom+ea.clientHeight/2;
  var pre=editor.precanvas||document.querySelector('#drawflow .drawflow');
  if(pre)pre.style.transform='translate('+editor.canvas_x+'px, '+editor.canvas_y+'px) scale('+editor.zoom+')';
  updateMinimap();
}

function nodesToEvents(){
  var exportData=editor.export();
  var nodes=exportData.drawflow.Home.data;
  var sorted=Object.keys(nodes).map(function(id){return{id:parseInt(id),data:nodes[id]};});
  sorted.sort(function(a,b){return a.data.pos_x-b.data.pos_x;});
  var events=[];
  for(var i=0;i<sorted.length;i++){
    var nd=sorted[i];
    var idx=nd.id;
    if(allEvents[idx]){
      var ev=JSON.parse(JSON.stringify(allEvents[idx]));
      var card=document.querySelector('[data-idx="'+idx+'"]');
      if(card){
        var wi=card.querySelector('input[type="number"]');
        if(wi)ev._wait=parseFloat(wi.value)||0;
        if(card.classList.contains('node-disabled'))ev._disabled=true;
        var cm=card.querySelector('.node-comment');
        if(cm)ev._comment=cm.textContent.replace(/^\/\/ /,'');
      }
      events.push(ev);
    }
  }
  return events;
}

function updateWait(idx,val){
  document.getElementById('status-left').textContent='已修改';
}

function saveScript(){
  var events=nodesToEvents();
  if(events.length===0){document.getElementById('status-left').textContent='没有步骤可保存';return;}
  var exportData=editor.export();
  bridge('save',{events:events,xml:JSON.stringify(exportData)});
  document.getElementById('status-left').textContent='已保存 ('+events.length+' 步)';
}

function loadScript(){
  document.getElementById('status-left').textContent='正在加载...';
  var x=new XMLHttpRequest();x.open('POST',BRIDGE,true);x.setRequestHeader('Content-Type','application/json');
  x.onreadystatechange=function(){if(x.readyState===4&&x.status===200){try{var r=JSON.parse(x.responseText);if(r.ok&&r.result&&r.result.events){eventsToNodes(r.result.events);}else{document.getElementById('status-left').textContent='加载失败';}}catch(e){document.getElementById('status-left').textContent='加载失败';}}};
  x.send(JSON.stringify({action:'load',data:{}}));
}

function runScript(){
  var events=nodesToEvents();
  if(events.length===0){document.getElementById('status-left').textContent='没有步骤可运行';return;}
  bridge('run',{events:events});
  document.getElementById('status-left').textContent='正在运行...';
}

function clearAll(){
  editor.clear();
  allEvents=[];
  document.getElementById('status-left').textContent='已清空';
}

function addCondition(){
  var html='<div class="node-card" data-idx="cond"><div class="node-thumb-placeholder">条件分支</div><div class="node-title">条件判断</div><div class="node-desc">OCR文字识别</div><div class="node-param">文字 <input type="text" value="登录" style="width:80px"> 超时 <input type="number" value="10" style="width:40px">s</div></div>';
  var id=editor.addNode('condition',1,2,400,200,'node-type-cond',{},html);
  allEvents[id]={type:'if',condition:'ocr_text',text:'登录',timeout:10,time:0};
  document.getElementById('status-left').textContent='已添加条件节点';
}

function addLoop(){
  var html='<div class="node-card" data-idx="loop"><div class="node-thumb-placeholder">循环</div><div class="node-title">循环</div><div class="node-desc">重复执行</div><div class="node-param">次数 <input type="number" value="3" min="1" style="width:40px"></div></div>';
  var id=editor.addNode('loop',1,1,400,300,'node-type-loop',{},html);
  allEvents[id]={type:'for',count:3,variable:'_i',time:0};
  document.getElementById('status-left').textContent='已添加循环节点';
}

function addWait(){
  var html='<div class="node-card" data-idx="wait"><div class="node-thumb-placeholder">等待</div><div class="node-title">等待</div><div class="node-desc">固定等待时间</div><div class="node-param">等待 <input type="number" step="0.1" min="0.1" value="1" style="width:50px">s</div></div>';
  var id=editor.addNode('wait',1,1,400,400,'node-type-wait',{},html);
  allEvents[id]={type:'wait_for',strategy:'timeout',timeout:1,time:0};
  document.getElementById('status-left').textContent='已添加等待节点';
}

editor.on('contextmenu',function(e){
  var pos=e.detail.pos_x!==undefined?{x:e.detail.pos_x,y:e.detail.pos_y}:{x:e.clientX,y:e.clientY};
  if(e.detail.node_id){
    ctxNodeId=e.detail.node_id;
    var menu=document.getElementById('ctx-menu');
    menu.style.left=pos.x+'px';
    menu.style.top=pos.y+'px';
    menu.style.display='block';
  }
});

document.addEventListener('click',function(){document.getElementById('ctx-menu').style.display='none';});

function ctxDisable(){
  if(!ctxNodeId)return;
  var el=document.querySelector('#node-'+ctxNodeId+' .node-card');
  if(el)el.classList.add('node-disabled');
  if(allEvents[ctxNodeId])allEvents[ctxNodeId]._disabled=true;
  document.getElementById('status-left').textContent='已禁用步骤';
}

function ctxEnable(){
  if(!ctxNodeId)return;
  var el=document.querySelector('#node-'+ctxNodeId+' .node-card');
  if(el)el.classList.remove('node-disabled');
  if(allEvents[ctxNodeId])allEvents[ctxNodeId]._disabled=false;
  document.getElementById('status-left').textContent='已启用步骤';
}

function ctxDelete(){
  if(!ctxNodeId)return;
  editor.removeNodeId('node-'+ctxNodeId);
  delete allEvents[ctxNodeId];
  document.getElementById('status-left').textContent='已删除步骤';
}

function ctxComment(){
  if(!ctxNodeId)return;
  var text=prompt('输入注释:');
  if(!text)return;
  var card=document.querySelector('#node-'+ctxNodeId+' .node-card');
  if(!card)return;
  var existing=card.querySelector('.node-comment');
  if(existing){existing.textContent='// '+text;}
  else{var d=document.createElement('div');d.className='node-comment';d.textContent='// '+text;card.appendChild(d);}
  if(allEvents[ctxNodeId])allEvents[ctxNodeId]._comment=text;
  document.getElementById('status-left').textContent='已添加注释';
}

function loadInitialEvents(){
  document.getElementById('status-left').textContent='正在连接bridge...';
  var x=new XMLHttpRequest();x.open('POST',BRIDGE,true);x.setRequestHeader('Content-Type','application/json');
  x.onerror=function(){document.getElementById('status-left').textContent='bridge连接失败';};
  x.ontimeout=function(){document.getElementById('status-left').textContent='bridge超时';};
  x.timeout=5000;
  x.onreadystatechange=function(){
    if(x.readyState===4){
      if(x.status===200){
        try{var r=JSON.parse(x.responseText);if(r.ok&&r.result&&r.result.events&&r.result.events.length>0){eventsToNodes(r.result.events);document.getElementById('status-left').textContent='已加载 '+r.result.events.length+' 步 | 滚轮缩放 | 拖拽平移';}else{document.getElementById('status-left').textContent='无步骤数据';}}catch(e){document.getElementById('status-left').textContent='解析失败';}
      }else{
        document.getElementById('status-left').textContent='bridge错误 '+x.status;
      }
    }
  };
  x.send(JSON.stringify({action:'load',data:{}}));
}

loadInitialEvents();
</script>
</body>
</html>
